<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Magic of Tarot and Astrology - Course Companion</title>
  <style>
    :root {
      --ink: #27222c;
      --muted: #6f6374;
      --paper: #fff7fb;
      --paper-deep: #eef9f8;
      --panel: #fffdfd;
      --line: rgba(139, 115, 148, 0.2);
      --rose: #f4c5d5;
      --rose-deep: #d889a5;
      --teal: #248c90;
      --teal-soft: #d9f3f0;
      --violet: #8560a7;
      --violet-soft: #efe6f8;
      --gold: #c69b4b;
      --gold-soft: #f4e3bf;
      --green: #698c72;
      --glass: rgba(255, 255, 255, 0.55);
      --glass-strong: rgba(255, 255, 255, 0.72);
      --glass-line: rgba(255, 255, 255, 0.62);
      --shadow: 0 18px 52px rgba(74, 44, 84, 0.14);
      --radius: 8px;
      --sans: "Segoe UI", Arial, sans-serif;
      --serif: Georgia, "Times New Roman", serif;
      --mono: "Cascadia Mono", "Courier New", monospace;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      color: var(--ink);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.5;
      background:
        linear-gradient(135deg, rgba(244, 197, 213, 0.62) 0%, rgba(255, 255, 255, 0) 34%),
        linear-gradient(220deg, rgba(157, 225, 219, 0.55) 0%, rgba(255, 255, 255, 0) 38%),
        linear-gradient(180deg, #fff8fc 0%, #f5fbfb 46%, #f8f0fb 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.52;
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, 0.92) 1px, transparent 1.8px),
        radial-gradient(circle, rgba(133, 96, 167, 0.26) 1px, transparent 1.8px),
        linear-gradient(115deg, rgba(255, 255, 255, 0.24), rgba(36, 140, 144, 0.08), rgba(244, 197, 213, 0.18));
      background-position: 0 0, 28px 34px, 0 0;
      background-size: 78px 78px, 124px 124px, 100% 100%;
      animation: skyDrift 28s linear infinite;
      mask-image: linear-gradient(to bottom, black, rgba(0, 0, 0, 0.78) 72%, transparent);
    }

    @keyframes skyDrift {
      from { background-position: 0 0, 28px 34px, 0 0; }
      to { background-position: 78px 78px, 152px 158px, 0 0; }
    }

    .starscape {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .twinkle {
      position: absolute;
      border-radius: 50%;
      animation: twinkleAnim ease-in-out infinite;
    }

    @keyframes twinkleAnim {
      0%, 100% { opacity: 0.08; transform: scale(0.78); }
      50% { opacity: 0.9; transform: scale(1.14); }
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
    }

    .shell {
      width: min(1500px, calc(100% - 32px));
      margin: 0 auto;
      padding: 22px 0 34px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      padding: 8px 4px 14px;
    }

    .brand {
      display: grid;
      gap: 6px;
      align-content: center;
    }

    .brand-line {
      height: 3px;
      border-radius: 2px;
      max-width: 360px;
      margin-top: 4px;
      background: linear-gradient(90deg, var(--teal), var(--rose-deep), var(--violet), transparent);
    }

    .kicker {
      color: var(--teal);
      font-family: var(--sans);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0;
      font-weight: 850;
    }

    h1,
    h2,
    h3,
    h4 {
      margin: 0;
      line-height: 1.08;
      letter-spacing: 0;
    }

    h1 {
      max-width: 780px;
      font-family: var(--serif);
      font-size: 28px;
      font-weight: 700;
      color: var(--violet);
      background: linear-gradient(105deg, var(--violet), var(--teal), var(--rose-deep));
      background-size: 220% 220%;
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: titleGlow 9s ease infinite;
    }

    @keyframes titleGlow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    h2 {
      font-family: var(--serif);
      font-size: 31px;
    }

    h3 {
      font-size: 20px;
      font-weight: 800;
    }

    h4 {
      font-size: 16px;
      font-weight: 800;
    }

    p {
      margin: 0;
    }

    .subtitle {
      max-width: 760px;
      color: var(--muted);
      font-size: 16px;
    }

    .stats {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .stat {
      display: grid;
      gap: 2px;
      text-align: center;
    }

    .stat-ring {
      width: 48px;
      height: 48px;
      position: relative;
    }

    .stat-ring svg {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }

    .stat-ring-num {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-family: var(--serif);
      font-size: 13px;
      font-weight: 700;
    }

    .stat span {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
      margin-top: 2px;
    }

    .tabs {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      align-items: center;
      margin: 10px 0;
    }

    .tab,
    .btn,
    .chip,
    .select-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 36px;
      padding: 8px 12px;
      border: 1px solid rgba(139, 115, 148, 0.22);
      border-radius: var(--radius);
      color: var(--ink);
      background: rgba(255, 255, 255, 0.58);
      cursor: pointer;
      font-weight: 800;
      font-size: 13px;
      text-decoration: none;
      box-shadow: 0 6px 18px rgba(74, 44, 84, 0.05);
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease, box-shadow 140ms ease;
      white-space: nowrap;
    }

    .tab {
      flex: 1;
    }

    .tab[data-active="true"],
    .chip[data-active="true"],
    .select-button[data-active="true"] {
      border-color: rgba(23, 125, 130, 0.45);
      color: #fff;
      background: linear-gradient(135deg, var(--teal), var(--violet));
      box-shadow: 0 12px 28px rgba(36, 140, 144, 0.22);
    }

    .tab:hover,
    .btn:hover,
    .chip:hover,
    .select-button:hover {
      transform: translateY(-1px);
      border-color: var(--teal);
      box-shadow: 0 10px 28px rgba(36, 140, 144, 0.16);
    }

    .btn.primary {
      border-color: var(--teal);
      color: #fff;
      background: linear-gradient(90deg, var(--teal), var(--rose-deep), var(--violet), var(--teal));
      background-size: 260% auto;
      animation: btnGr 7s linear infinite;
    }

    @keyframes btnGr {
      0% { background-position: 0% center; }
      100% { background-position: 260% center; }
    }

    .btn.warn {
      border-color: rgba(216, 137, 165, 0.55);
      color: var(--ink);
      background: var(--rose);
    }

    .btn.ghost {
      background: rgba(255, 255, 255, 0.34);
    }

    .btn[data-ico]::before,
    .tab[data-ico]::before {
      content: attr(data-ico);
      display: none;
      place-items: center;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      color: currentColor;
      border: 1px solid currentColor;
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1;
    }

    .main {
      min-height: 600px;
    }

    .view {
      display: grid;
      gap: 16px;
    }

    .band,
    .surface {
      border: 1px solid var(--glass-line);
      border-radius: var(--radius);
      background: var(--glass);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 12px 34px rgba(74, 44, 84, 0.1);
    }

    .band {
      padding: 18px;
    }

    .surface {
      padding: 16px;
    }

    .section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    .section-head .copy {
      display: grid;
      gap: 5px;
      max-width: 820px;
    }

    .muted {
      color: var(--muted);
    }

    .mini {
      color: var(--muted);
      font-size: 13px;
    }

    .layout-2 {
      display: grid;
      grid-template-columns: minmax(280px, 0.86fr) minmax(420px, 1.42fr);
      gap: 16px;
      align-items: start;
    }

    .layout-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .sign-strip,
    .filter-strip,
    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .sign-strip {
      max-height: 220px;
      overflow: auto;
      padding-right: 3px;
    }

    .select-button {
      min-width: 105px;
      justify-content: flex-start;
    }

    .select-button .mark {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--rose-deep), var(--teal));
      box-shadow: 0 0 0 3px rgba(244, 197, 213, 0.28);
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin: 10px 0 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 5px 9px;
      border: 1px solid rgba(255, 255, 255, 0.64);
      border-radius: 999px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.54);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      font-size: 12px;
      font-weight: 800;
    }

    .badge.fire { border-color: rgba(216, 137, 165, 0.62); background: #fff4f7; }
    .badge.earth { border-color: rgba(105, 140, 114, 0.46); background: #f3f8f1; }
    .badge.air { border-color: rgba(23, 125, 130, 0.42); background: #eefafa; }
    .badge.water { border-color: rgba(114, 84, 147, 0.38); background: #f4eff9; }

    .prompt-list,
    .source-list,
    .plain-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .prompt-list li,
    .source-list li,
    .plain-list li {
      padding: 10px 11px;
      border-left: 4px solid var(--teal);
      border-radius: 0 var(--radius) var(--radius) 0;
      background: rgba(255, 255, 255, 0.56);
    }

    .source-list li {
      border-left-color: var(--gold);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .course-card,
    .mini-card,
    .reading-entry,
    .note-item {
      border: 1px solid rgba(255, 255, 255, 0.62);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.54);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 10px 24px rgba(74, 44, 84, 0.08);
    }

    .course-card {
      display: grid;
      gap: 8px;
      padding: 12px;
      border-left: 3px solid var(--rose-deep);
    }

    .course-card .top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .course-card .body {
      display: grid;
      gap: 8px;
    }

    .course-card .foot {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding-top: 8px;
      border-top: 1px solid rgba(139, 115, 148, 0.12);
    }

    .card-title {
      display: grid;
      gap: 2px;
    }

    .card-title strong {
      font-size: 15px;
      line-height: 1.12;
    }

    .arcana {
      display: grid;
      place-items: center;
      flex: 0 0 36px;
      width: 36px;
      height: 46px;
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: var(--radius);
      color: var(--violet);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.72), rgba(216, 243, 240, 0.34)),
        linear-gradient(315deg, rgba(244, 197, 213, 0.34), rgba(133, 96, 167, 0.16));
      font-family: var(--serif);
      font-size: 16px;
      font-weight: 700;
      box-shadow: inset 0 0 0 3px rgba(255, 255, 255, 0.28), 0 8px 18px rgba(74, 44, 84, 0.1);
    }

    .arcana::before {
      content: "";
      position: absolute;
      inset: 4px;
      border: 1px solid rgba(36, 140, 144, 0.18);
      border-radius: 4px;
      pointer-events: none;
    }

    .card-meta {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .compact-stack {
      display: grid;
      gap: 8px;
    }

    textarea,
    input[type="search"],
    input[type="text"],
    select {
      width: 100%;
      border: 1px solid rgba(139, 115, 148, 0.2);
      border-radius: var(--radius);
      color: var(--ink);
      background: rgba(255, 255, 255, 0.62);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.64);
    }

    textarea {
      min-height: 88px;
      resize: none;
      padding: 10px 11px;
    }

    input[type="search"],
    input[type="text"],
    select {
      min-height: 42px;
      padding: 8px 10px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--ink);
      font-weight: 800;
    }

    label span {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .checkline {
      display: inline-flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 8px 12px;
      border: 1px solid rgba(36, 140, 144, 0.28);
      border-radius: var(--radius);
      color: var(--ink);
      font-weight: 800;
      background: rgba(255, 255, 255, 0.52);
      box-shadow: 0 8px 22px rgba(36, 140, 144, 0.08);
      cursor: pointer;
    }

    .checkline[data-done="true"] {
      color: #fff;
      border-color: rgba(36, 140, 144, 0.52);
      background: linear-gradient(135deg, var(--teal), var(--violet));
      box-shadow: 0 12px 28px rgba(36, 140, 144, 0.2);
    }

    .checkline input {
      width: 20px;
      height: 20px;
      accent-color: var(--teal);
    }

    .checkline span {
      color: currentColor;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 850;
      text-transform: none;
    }

    .progress-row {
      display: grid;
      gap: 7px;
    }

    .progress-track {
      height: 9px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.62);
      box-shadow: inset 0 1px 4px rgba(74, 44, 84, 0.08);
    }

    .progress-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--teal), var(--rose-deep), var(--violet));
    }

    .library-toolbar,
    .lab-grid {
      display: grid;
      grid-template-columns: minmax(240px, 1fr) auto;
      gap: 12px;
      align-items: end;
    }

    .lab-grid {
      align-items: stretch;
    }

    .library-results {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 12px;
    }

    .mini-card {
      display: grid;
      gap: 10px;
      min-height: 210px;
      padding: 13px;
    }

    .mini-card .mini-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .mini-card .mini-top strong {
      font-size: 17px;
    }

    .empty {
      padding: 18px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      background: rgba(255, 255, 255, 0.46);
    }

    .draw-card {
      display: grid;
      place-items: center;
      min-height: 220px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.68);
      border-radius: var(--radius);
      color: var(--ink);
      background:
        linear-gradient(145deg, rgba(244, 197, 213, 0.38), rgba(216, 243, 240, 0.58)),
        rgba(255, 255, 255, 0.54);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      text-align: center;
    }

    .draw-card .arcana {
      width: 62px;
      height: 84px;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .reading-entry,
    .note-item {
      display: grid;
      gap: 8px;
      padding: 12px;
    }

    .spread-position-row {
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 8px;
      align-items: start;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

    .spread-pos-num {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-family: var(--serif);
      font-weight: 700;
      font-size: 14px;
      color: var(--violet);
      background: rgba(133, 96, 167, 0.1);
      margin-top: 2px;
    }

    .note-item pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: var(--sans);
      color: var(--ink);
    }

    .source-grid {
      display: grid;
      grid-template-columns: minmax(280px, 0.9fr) minmax(360px, 1.1fr);
      gap: 16px;
    }

    .library-cover {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      padding: 18px;
      border: 1px solid var(--glass-line);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.76), rgba(244, 197, 213, 0.24), rgba(216, 243, 240, 0.38)),
        rgba(255, 255, 255, 0.48);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .study-shell {
      display: grid;
      grid-template-columns: minmax(220px, 260px) minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .lesson-rail,
    .lesson-stage,
    .library-panel {
      border: 1px solid var(--glass-line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.48);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 12px 34px rgba(74, 44, 84, 0.1);
    }

    .lesson-rail {
      position: sticky;
      top: 14px;
      display: grid;
      gap: 8px;
      max-height: calc(100vh - 28px);
      overflow: auto;
      padding: 12px;
    }

    .rail-head {
      display: grid;
      gap: 6px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(139, 115, 148, 0.16);
    }

    .lesson-list {
      display: grid;
      gap: 4px;
    }

    .lesson-button {
      display: grid;
      grid-template-columns: 16px 1fr;
      gap: 8px;
      align-items: start;
      width: 100%;
      min-height: 38px;
      padding: 7px 8px;
      border: 1px solid rgba(255, 255, 255, 0);
      border-radius: var(--radius);
      color: var(--ink);
      background: rgba(255, 255, 255, 0.22);
      text-align: left;
      cursor: pointer;
      font-size: 13px;
      transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
    }

    .lesson-button:hover,
    .lesson-button[data-active="true"] {
      transform: translateY(-1px);
      border-color: rgba(36, 140, 144, 0.32);
      background: rgba(255, 255, 255, 0.6);
    }

    .lesson-button[data-done="true"] strong {
      color: var(--teal);
    }

    .lesson-button strong,
    .lesson-button em {
      display: block;
      font-style: normal;
    }

    .lesson-button strong {
      font-size: 12px;
    }

    .lesson-button em {
      margin-top: 1px;
      color: var(--muted);
      font-size: 10px;
    }

    .lesson-dot {
      width: 14px;
      height: 14px;
      margin-top: 2px;
      position: relative;
      border-radius: 4px;
      border: 1px solid rgba(36, 140, 144, 0.34);
      background: rgba(255, 255, 255, 0.62);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    .lesson-dot[data-done="true"] {
      border-color: rgba(36, 140, 144, 0.76);
      background: linear-gradient(135deg, var(--teal), var(--violet));
      box-shadow: 0 0 0 4px rgba(36, 140, 144, 0.12);
    }

    .lesson-dot::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 1px;
      width: 4px;
      height: 7px;
      border-right: 1.5px solid #fff;
      border-bottom: 1.5px solid #fff;
      opacity: 0;
      transform: rotate(42deg);
    }

      opacity: 1;
    }

      padding: 0;
      overflow: hidden;
    }

      border: 0;
      box-shadow: none;
      background: transparent;
    }

    .lesson-focus {
      min-height: 620px;
    }

    .card-index {
      grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
    }

    .compact-library {
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .library-card {
      display: grid;
      gap: 11px;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.66);
      border-top: 4px solid var(--teal);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.52);

      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 12px 28px rgba(74, 44, 84, 0.09);

    .library-card.water { border-top-color: var(--violet); }
    .library-card.air { border-top-color: var(--teal); }
    .library-card.earth { border-top-color: var(--green); }
    .library-card.planet { border-top-color: var(--gold); }

    .library-card-head {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 11px;
      align-items: start;
    }

    .library-card-head .arcana {
      width: 36px;
      height: 46px;
      font-size: 15px;
    }

    .badge.planet {
      border-color: rgba(201, 154, 67, 0.45);
      background: #fff8e8;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      max-width: 340px;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.52);
      border-radius: var(--radius);
      color: #fff;
      background: linear-gradient(135deg, var(--teal), var(--violet));
      box-shadow: var(--shadow);
      transform: translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: 180ms ease;
    }

    .toast[data-show="true"] {
      opacity: 1;
      transform: translateY(0);
    }

    .footer {
      display: grid;
      gap: 6px;
      margin-top: 18px;
      padding: 15px 18px;
      border-top: 1px solid rgba(139, 115, 148, 0.16);
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      background: rgba(255, 255, 255, 0.28);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .footer a {
      color: var(--teal);
      font-weight: 800;
    }

      .topbar,
      .layout-2,
      .source-grid,
      .study-shell,
      .lab-grid {
        grid-template-columns: 1fr;
      }

      .lesson-rail {
        position: static;
        max-height: none;
      }

      }

      h1 {

      }

      .card-grid {
        grid-template-columns: 1fr;
      }
    }

    function loadState() {

        if (!raw) return baseState();
        return Object.assign(baseState(), JSON.parse(raw));
      } catch (error) {
        return baseState();
      }
    }

    function signById(id) {
      return SIGNS.find(sign => sign.id === id) || SIGNS[0];
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function cardMark(name) {
      return name
        .replace(/^The\s+/i, "")
        .replace(/Ace of /i, "A ")
        .replace(/Two of /i, "2 ")
        .replace(/Three of /i, "3 ")
        .replace(/Four of /i, "4 ")
        .replace(/Five of /i, "5 ")
        .replace(/Six of /i, "6 ")
        .replace(/Seven of /i, "7 ")
        .replace(/Eight of /i, "8 ")
        .replace(/Nine of /i, "9 ")
        .replace(/Ten of /i, "10 ")
        .split(/\s+/)
        .map(part => part[0])
        .join("")
        .slice(0, 3)
        .toUpperCase();
    }

    function noteKey(scope, id) {
      return `${scope}:${id}`;

    function allLibraryCards() {
      const raw = allSignCards().concat(allCourtCards(), allPlanetCards());
      const seen = new Set();
      const unique = raw.filter(card => {
        if (seen.has(card.name)) return false;
        seen.add(card.name);
        return true;
      });
      const suitOrder = { "Major": 0, "Planet": 0, "Wands": 1, "Cups": 2, "Swords": 3, "Pentacles": 4 };
      function suitOf(card) {
        if (card.category === "Major" || card.category === "Planet") return "Major";
        const name = card.name;
        if (name.includes("Wands")) return "Wands";
        if (name.includes("Cups")) return "Cups";
        if (name.includes("Swords")) return "Swords";
        if (name.includes("Pentacles")) return "Pentacles";
        return "Major";
      }
      const majorOrder = [
        "The Fool", "The Magician", "The High Priestess", "The Empress", "The Emperor",
        "The Hierophant", "The Lovers", "The Chariot", "Strength", "The Hermit",
        "Wheel of Fortune", "Justice", "The Hanged Man", "Death", "Temperance",
        "The Devil", "The Tower", "The Star", "The Moon", "The Sun", "Judgement", "The World"
      ];
      const pipRank = ["Ace", "Two", "Three", "Four", "Five", "Six", "Seven", "Eight", "Nine", "Ten", "Page", "Knight", "Queen", "King"];
      function rankOf(card) {
        const suit = suitOf(card);
        if (suit === "Major") {
          const idx = majorOrder.indexOf(card.name);
          return idx >= 0 ? idx : 99;
        }
        for (let i = 0; i < pipRank.length; i++) {
          if (card.name.startsWith(pipRank[i])) return i;
        }
        return 99;
      }
      unique.sort((a, b) => {
        const sa = suitOrder[suitOf(a)] || 0;
        const sb = suitOrder[suitOf(b)] || 0;
        if (sa !== sb) return sa - sb;
        return rankOf(a) - rankOf(b);
      });
      return unique;
    }

    function allLessons() {
      return [{ id: INTRO.id, name: INTRO.name, type: "intro" }]
        .concat(SIGNS.map(sign => ({ id: sign.id, name: sign.name, type: "sign" })))
        .concat(EXTRA_LESSONS.map(lesson => ({ id: lesson.id, name: lesson.name, type: "extra" })));
    }

    function selectedLesson() {
      const id = state.activeLesson || "intro";
      if (id === "intro") return { type: "intro", data: INTRO };
      const sign = SIGNS.find(item => item.id === id);
      if (sign) return { type: "sign", data: sign };
      const extra = EXTRA_LESSONS.find(item => item.id === id);
      if (extra) return { type: "extra", data: extra };
      return { type: "intro", data: INTRO };
    }

    function updateStats() {
      const total = allLessonIds().length;
      const done = completedCount();
      const notes = noteCount();
      const readings = state.readings.length + (state.spreadReadings || []).length;
      const circ = 119.4;

      document.getElementById("stat-lessons").textContent = `${done}`;
      document.getElementById("stat-notes").textContent = String(notes);
      document.getElementById("stat-readings").textContent = String(readings);

      const lessonRing = document.getElementById("ring-lessons");
      if (lessonRing) lessonRing.style.strokeDashoffset = String(circ - (circ * done / total));

      const notesRing = document.getElementById("ring-notes");
      if (notesRing) {
        const noteMax = Math.max(notes, total);
        notesRing.style.strokeDashoffset = String(circ - (circ * Math.min(notes, noteMax) / noteMax));
      }

      const readingsRing = document.getElementById("ring-readings");
      if (readingsRing) {
        const readMax = Math.max(readings, 10);
        readingsRing.style.strokeDashoffset = String(circ - (circ * Math.min(readings, readMax) / readMax));
      }
    }

    function renderTabs() {
      document.getElementById("tabs").innerHTML = TABS.map(tab => `
        <button class="tab" data-ico="${tab.ico}" data-action="tab" data-tab="${tab.id}" data-active="${state.activeTab === tab.id}">
          ${tab.label}
        </button>
      `).join("");
    }

    function render() {
      if (!TABS.some(tab => tab.id === state.activeTab)) {
        state.activeTab = "overview";
      }
      if (!allLessons().some(lesson => lesson.id === state.activeLesson)) {
        state.activeLesson = "intro";
      }
      renderTabs();
      updateStats();
      const app = document.getElementById("app");
      const renderers = {
        overview: renderOverview,
        library: renderLibrary,
        spreads: renderSpreads,
        lab: renderLab,

        Venus: "Beauty, love, pleasure, material prosperity",
        Mercury: "Communication, individual mind, intellect, reason",
        Moon: "Subconscious, intuition, emotional self, magic",
        Sun: "Ego, identity, authenticity, pride, expression",
        Pluto: "Letting go, power, transformation, psyche",

        Saturn: "Boundaries, time, initiation, cycles, responsibility",
        Uranus: "Awakening, change, revolution, innovation",
        Neptune: "Oneness, dreams, hope, creativity, fantasy"

      return map[ruler] || "";

    function renderLibrary() {
      const query = state.libraryQuery.trim().toLowerCase();
      const filter = state.libraryFilter === "all" ? "All" : state.libraryFilter || "All";
      let cards = allLibraryCards();
      if (filter !== "All") {
        cards = cards.filter(card => {
          if (["Fire", "Earth", "Air", "Water"].includes(filter)) return card.element === filter;
          if (filter === "Major") return card.category === "Major" || card.category === "Planet";
          if (filter === "Minor") return card.category === "Minor";
          if (filter === "Court") return card.category === "Court";
          if (filter === "Ace") return card.category === "Ace";
          if (filter === "Zodiac") return Boolean(card.signId);
          if (filter === "Planet") return card.category === "Planet";
          return true;
        });
      }
      if (query) {
        cards = cards.filter(card => [
          card.name, card.keyword, card.teaching, card.signName, card.element, card.modality, card.ruler, card.planet, card.kind, card.category, card.suit, card.signs, card.family, card.traits
        ].join(" ").toLowerCase().includes(query));
      }
      return `
        <div class="view">
          <section class="library-cover">
            <div class="section-head">
              <div class="copy">
                <div class="kicker">Card Library</div>
                <h2>Search the whole course by card, sign, planet, element, or keyword.</h2>
                <p class="muted">Court cards, planetary majors, zodiac majors, aces, and minor correspondences all live in one index now.</p>
              </div>
            </div>
            <div class="library-toolbar">
              <label>
                <span>Search</span>
                <input type="search" id="library-search" value="${escapeHtml(state.libraryQuery)}" placeholder="Try King of Wands, Six of Wands, Venus, Scorpio, grief">
              </label>
              <div class="filter-strip">
                ${["All", "Major", "Minor", "Court", "Ace", "Fire", "Water", "Air", "Earth", "Zodiac", "Planet"].map(item => `
                  <button class="chip" data-action="library-filter" data-filter="${escapeHtml(item)}" data-active="${filter === item}">${escapeHtml(item)}</button>
                `).join("")}
              </div>
            </div>
          </section>

          <section class="surface library-panel">
            <div class="section-head">
              <div class="copy">
                <h3>${cards.length} Card${cards.length === 1 ? "" : "s"}</h3>
                <p class="mini">${filter}${query ? ` | "${escapeHtml(state.libraryQuery)}"` : ""}</p>
              </div>
            </div>
            <div class="library-results card-index">
              ${cards.length ? cards.map(card => renderLibraryCard(card)).join("") : `<div class="empty">No cards match this search yet. Try a card name, sign, planet, suit, or keyword.</div>`}
            </div>
          </section>
        </div>
      `;
    }

      return `
        <article class="library-card ${accentClass}">
          <div class="library-card-head">
            <div class="arcana">${escapeHtml(cardMark(card.name))}</div>
            <div>
              <strong>${escapeHtml(card.name)}</strong>
              <p class="card-meta">${escapeHtml(card.kind)} | ${escapeHtml(card.planet)}</p>
            </div>
          </div>
          <div class="badge-row">
            <span class="badge ${accentClass}">${escapeHtml(card.element)}</span>
            <span class="badge">${escapeHtml(card.category)}</span>
            <span class="badge">${escapeHtml(card.ruler)}</span>

          <p><strong>${escapeHtml(card.keyword)}</strong></p>

              </div>

              <div class="stack">
                <section class="surface">
                  <div class="section-head">
                    <div class="copy">
                      <h2>Reading Lab</h2>
                      <p class="muted">${escapeHtml(drawCard.teaching)}</p>
                    </div>
                  </div>
                  <div class="layout-3">
                    <label><span>Sign lens</span><select id="lab-sign">${SIGNS.map(item => `<option value="${item.id}" ${item.id === drawSign.id ? "selected" : ""}>${item.name}</option>`).join("")}</select></label>
                    <label><span>Question</span><input type="text" id="lab-question" placeholder="Reading question or seasonal focus"></label>
                    <label><span>Client or context</span><input type="text" id="lab-context" placeholder="Self, client, season, or spread position"></label>
                  </div>
                  <div class="layout-3" style="margin-top:12px">
                    <label><span>Card message</span><textarea id="lab-card" rows="5"></textarea></label>
                    <label><span>Astrology lens</span><textarea id="lab-astro" rows="5">${escapeHtml(drawSign.growth)}</textarea></label>
                    <label><span>Next question</span><textarea id="lab-next" rows="5"></textarea></label>
                  </div>
                  <div class="button-row" style="margin-top:12px">
                    <button class="btn primary" data-ico="+" data-action="save-reading">Save Reading</button>
                  </div>
                </section>

                <section class="surface">
                  <div class="section-head">
                    <div class="copy">
                      <h3>Saved Readings</h3>
                      <p class="mini">${state.readings.length} saved</p>
                    </div>
                  </div>
                  <div class="stack">
                    ${state.readings.length ? state.readings.map(renderReading).join("") : `<div class="empty">No saved reading labs yet.</div>`}
                  </div>
                </section>
              </div>
            </div>
          </section>
        </div>
      `;
    }

    function renderReading(reading) {
      return `
        <article class="reading-entry">
          <div class="section-head">
            <div class="copy">
              <h4>${escapeHtml(reading.cardName)} | ${escapeHtml(reading.signName)}</h4>
              <p class="mini">${escapeHtml(reading.created)}</p>
            </div>
            <button class="btn warn" data-ico="x" data-action="delete-reading" data-reading="${reading.id}">Delete</button>
          </div>
          ${reading.question ? `<p><strong>Question:</strong> ${escapeHtml(reading.question)}</p>` : ""}
          ${reading.context ? `<p><strong>Context:</strong> ${escapeHtml(reading.context)}</p>` : ""}
          ${reading.card ? `<p><strong>Card:</strong> ${escapeHtml(reading.card)}</p>` : ""}
          ${reading.astro ? `<p><strong>Astrology:</strong> ${escapeHtml(reading.astro)}</p>` : ""}
          ${reading.next ? `<p><strong>Next question:</strong> ${escapeHtml(reading.next)}</p>` : ""}
        </article>
      `;
    }

    function renderNotes() {
      const notes = Object.entries(state.notes)
        .filter(([, value]) => String(value || "").trim())
        .sort(([a], [b]) => a.localeCompare(b));
      return `
        <div class="view">
          <section class="band">
            <div class="section-head">
              <div class="copy">
                <h2>Notes and Export</h2>
                <p class="muted">Saved lesson, card, planet, and court notes.</p>
              </div>
              <div class="button-row">
                <button class="btn" data-ico="=" data-action="copy-export">Copy</button>
                <button class="btn" data-ico="v" data-action="download-md">Markdown</button>
                <button class="btn" data-ico="v" data-action="download-json">JSON</button>
                <button class="btn" data-ico="p" data-action="print">Print</button>
              </div>
            </div>
            <div class="layout-2">
              <section class="surface">
                <h3 style="margin-bottom:12px">Saved Notes</h3>
                <div class="stack">
                  ${notes.length ? notes.map(([key, value]) => `
                    <article class="note-item">
                      <strong>${escapeHtml(readableKey(key))}</strong>
                      <pre>${escapeHtml(value)}</pre>
                    </article>
                  `).join("") : `<div class="empty">No saved notes yet.</div>`}
                </div>
              </section>
              <section class="surface">
                <h3 style="margin-bottom:12px">Reading Labs</h3>
                <div class="stack">
                  ${state.readings.length ? state.readings.map(renderReading).join("") : `<div class="empty">No saved reading labs yet.</div>`}
                </div>
              </section>
              <section class="surface">
                <h3 style="margin-bottom:12px">Spread Readings</h3>
                <div class="stack">
                  ${(state.spreadReadings || []).length ? (state.spreadReadings || []).map(r => `
                    <article class="reading-entry">
                      <div class="section-head">
                        <div class="copy">
                          <h4>${escapeHtml(r.spreadName)}</h4>
                          <p class="mini">${escapeHtml(r.created)}</p>
                        </div>
                      </div>
                      ${r.context ? `<p><strong>Context:</strong> ${escapeHtml(r.context)}</p>` : ""}
                      ${(r.positions || []).length ? r.positions.map((p, i) =>
                        (p.card || p.note) ? `<p><strong>${i + 1}.</strong> ${p.card ? escapeHtml(p.card) : ""}${p.card && p.note ? " — " : ""}${p.note ? escapeHtml(p.note) : ""}</p>` : ""
                      ).join("") : ""}
                      ${r.takeaway ? `<p><strong>Takeaway:</strong> ${escapeHtml(r.takeaway)}</p>` : ""}
                    </article>
                  `).join("") : `<div class="empty">No saved spread readings yet.</div>`}
                </div>
              </section>
            </div>
          </section>
        </div>
      `;
    }

    function readableKey(key) {
      return key
        .replace(/^lesson:/, "Lesson: ")
        .replace(/^card:/, "Card: ")
        .replace(/^planet:/, "Planet card: ")
        .replace(/^court-card:/, "Court card: ")
        .replace(/^court:/, "Court: ")
        .replace(/:/g, " - ");
    }

    function exportText() {
      const parts = [];
      parts.push("# The Magic of Tarot and Astrology Notes");
      parts.push("");
      parts.push(`Exported: ${new Date().toLocaleString()}`);
      parts.push("");
      parts.push("## Lesson Progress");
      [{ id: INTRO.id, name: "Intro" }]
        .concat(SIGNS.map(sign => ({ id: sign.id, name: sign.name })))
        .concat(EXTRA_LESSONS.map(lesson => ({ id: lesson.id, name: lesson.name })))
        .forEach(item => {
        parts.push(`- ${state.completed[item.id] ? "[x]" : "[ ]"} ${item.name}`);
      });
      parts.push("");
      parts.push("## Notes");
      Object.entries(state.notes)
        .filter(([, value]) => String(value || "").trim())
        .sort(([a], [b]) => a.localeCompare(b))
        .forEach(([key, value]) => {
          parts.push(`### ${readableKey(key)}`);
          parts.push(String(value).trim());
          parts.push("");
        });
      parts.push("## Reading Labs");
      state.readings.forEach(reading => {
        parts.push(`### ${reading.cardName} | ${reading.signName}`);
        parts.push(`Date: ${reading.created}`);
        if (reading.question) parts.push(`Question: ${reading.question}`);
        if (reading.context) parts.push(`Context: ${reading.context}`);
        if (reading.card) parts.push(`Card: ${reading.card}`);
        if (reading.astro) parts.push(`Astrology: ${reading.astro}`);
        if (reading.next) parts.push(`Next question: ${reading.next}`);
        parts.push("");
      });
      return parts.join("\n");
    }

    function download(filename, content, type = "text/plain") {
      const blob = new Blob([content], { type });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(link.href), 500);
    }

    function toast(message) {
      const box = document.getElementById("toast");
      box.textContent = message;
      box.dataset.show = "true";
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => {
        box.dataset.show = "false";
      }, 2200);
    }

    function saveReading() {
      const sign = signById(document.getElementById("lab-sign").value);
      const draw = state.currentDraw || { signId: sign.id, cardName: sign.cards[0].name };
      const drawSign = signById(draw.signId);
      const drawCard = drawSign.cards.find(card => card.name === draw.cardName) || drawSign.cards[0];
      const reading = {
        id: `reading-${Date.now()}`,
        created: new Date().toLocaleString(),
        signId: sign.id,
        signName: sign.name,
        cardName: drawCard.name,
        question: document.getElementById("lab-question").value.trim(),
        context: document.getElementById("lab-context").value.trim(),
        card: document.getElementById("lab-card").value.trim(),
        astro: document.getElementById("lab-astro").value.trim(),
        next: document.getElementById("lab-next").value.trim()
      };
      state.readings.unshift(reading);
      saveState();
      render();
      toast("Reading saved.");
    }

    function initTwinkles() {
      const container = document.getElementById("starscape");
      if (!container || container.children.length) return;
      const colors = [
        "rgba(255,255,255,0.92)",
        "rgba(244,197,213,0.72)",
        "rgba(216,243,240,0.8)",
        "rgba(198,155,75,0.55)"
      ];
      for (let index = 0; index < 44; index += 1) {
        const twinkle = document.createElement("div");
        twinkle.className = "twinkle";
        const size = 1 + Math.random() * 3;
        twinkle.style.width = `${size}px`;
        twinkle.style.height = `${size}px`;
        twinkle.style.left = `${Math.random() * 98}%`;
        twinkle.style.top = `${Math.random() * 98}%`;
        twinkle.style.background = colors[index % colors.length];
        twinkle.style.animationDuration = `${1.8 + Math.random() * 3.2}s`;
        twinkle.style.animationDelay = `${Math.random() * 2.8}s`;
        container.appendChild(twinkle);
      }
    }

    document.addEventListener("click", event => {
      const target = event.target.closest("[data-action]");
      if (!target) return;
      const action = target.dataset.action;

      if (action === "tab") {
        state.activeTab = target.dataset.tab;
        saveState();
        render();
      }

      if (action === "select-sign") {
        state.activeSign = target.dataset.sign;
        state.activeLesson = target.dataset.sign;
        saveState();
        render();
      }

      if (action === "select-sign-tab") {
        state.activeSign = target.dataset.sign;
        state.activeLesson = target.dataset.sign;
        state.activeTab = "overview";
        saveState();
        render();
      }

      if (action === "select-lesson") {
        state.activeLesson = target.dataset.lesson;
        if (SIGNS.some(sign => sign.id === state.activeLesson)) {
          state.activeSign = state.activeLesson;
        }
        state.activeTab = "overview";
        saveState();
        render();
      }

      if (action === "spread-season") {
        state.activeSpreadSeason = target.dataset.season;
        const first = SPREADS.find(s => s.season === state.activeSpreadSeason);
        if (first) state.activeSpread = first.id;
        saveState();
        render();
      }

      if (action === "select-spread") {
        state.activeSpread = target.dataset.spread;
        saveState();
        render();
      }

      if (action === "save-spread-reading") {
        const spreadId = target.dataset.spread;
        const posCount = parseInt(target.dataset.positions, 10) || 0;
        const spread = SPREADS.find(s => s.id === spreadId);
        const positions = [];
        for (let i = 0; i < posCount; i++) {
          const cardEl = document.getElementById("spread-card-" + i);
          const noteEl = document.getElementById("spread-note-" + i);
          positions.push({
            card: cardEl ? cardEl.value.trim() : "",
            note: noteEl ? noteEl.value.trim() : ""
          });
        }
        const reading = {
          id: `sr-${Date.now()}`,
          created: new Date().toLocaleString(),
          spreadId: spreadId,
          spreadName: spread ? spread.name : spreadId,
          context: document.getElementById("spread-context").value.trim(),
          positions: positions,
          takeaway: document.getElementById("spread-takeaway").value.trim()
        };
        if (!state.spreadReadings) state.spreadReadings = [];
        state.spreadReadings.unshift(reading);
        saveState();
        render();
        toast("Spread reading saved.");
      }

      if (action === "delete-spread-reading") {
        if (!state.spreadReadings) state.spreadReadings = [];
        state.spreadReadings = state.spreadReadings.filter(r => r.id !== target.dataset.reading);
        saveState();
        render();
        toast("Spread reading deleted.");
      }

      if (action === "toggle-complete") {
        const id = target.dataset.complete;
        state.completed[id] = target.checked;
        saveState();
        render();
      }

      if (action === "left-filter") {
        state.leftFilter = target.dataset.filter;
        saveState();
        render();
      }

      if (action === "library-filter") {
        state.libraryFilter = target.dataset.filter;
        saveState();
        render();
      }

      if (action === "random-card") {
        const cards = allSignCards();
        const pick = cards[Math.floor(Math.random() * cards.length)];
        state.currentDraw = { signId: pick.signId, cardName: pick.name };
        state.activeSign = pick.signId;
        saveState();
        render();
      }

      if (action === "save-reading") {
        saveReading();
      }

      if (action === "delete-reading") {
        state.readings = state.readings.filter(reading => reading.id !== target.dataset.reading);
        saveState();
        render();
        toast("Reading deleted.");
      }

      if (action === "copy-export") {
        const text = exportText();
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(() => toast("Notes copied."));
        } else {
          const area = document.createElement("textarea");
          area.value = text;
          document.body.appendChild(area);
          area.select();
          document.execCommand("copy");
          area.remove();
          toast("Notes copied.");
        }
      }

      if (action === "download-md") {
        download("magic-tarot-astrology-notes.md", exportText(), "text/markdown");
      }

      if (action === "download-json") {
        download("magic-tarot-astrology-data.json", JSON.stringify(state, null, 2), "application/json");
      }

      if (action === "print") {
        window.print();
      }
    });

    document.addEventListener("input", event => {
      if (event.target.matches("[data-note]")) {
        state.notes[event.target.dataset.note] = event.target.value;
        saveState();
      }

      if (event.target.id === "library-search") {
        state.libraryQuery = event.target.value;
        saveState();
        render();
        const search = document.getElementById("library-search");
        if (search) {
          search.focus();
          search.selectionStart = search.selectionEnd = state.libraryQuery.length;
        }
      }
    });

    document.addEventListener("change", event => {
      if (event.target.id === "lab-sign") {
        state.activeSign = event.target.value;
        saveState();
      }
    });

    initTwinkles();
    render();
  </script>
</body>
</html>
